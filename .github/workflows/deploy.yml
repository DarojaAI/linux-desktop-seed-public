# =============================================================================
# Linux Desktop - Deploy to Hetzner via GitHub Actions
# =============================================================================
# Workflow: terraform-apply -> deploy-desktop
#
# Required secrets:
#   HETZNER_API_TOKEN          - Hetzner API token
#   SSH_PRIVATE_KEY            - Private key for SSH access
#   DISCORD_BOT_TOKEN          - Discord bot token for OpenCLAW
#   OPENROUTER_API_KEY         - OpenRouter API key for Claude
#   OPENCLAW_DISCORD_CHANNEL_ID - Discord channel ID for VM
#
# Required variables:
#   HETZNER_LOCATION     - Datacenter (fsn1, nbg1, etc.)
#   SERVER_TYPE          - Server type (cpx21, cpx41, etc.)
# =============================================================================

name: Deploy Linux Desktop

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Deployment action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy
      environment:
        description: 'Target environment'
        required: true
        default: 'head'
        type: choice
        options:
          - head
          - prod
          - test

env:
  TF_VERSION: '1.7'
  TERRAFORM_DIR: 'terraform'

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    environment: head
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Terraform Init
        id: init
        run: |
          cd ${{ env.TERRAFORM_DIR }}
          terraform init -input=false \
            -backend-config="endpoint=${{ vars.HCX_STORAGE_URL }}" \
            -backend-config="access_key=${{ secrets.HCX_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.HCX_SECRET_KEY }}" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_requesting_account_id=true"

      - name: Terraform Plan
        id: plan
        if: github.event.inputs.action == 'plan' || github.event.inputs.action == 'apply'
        run: |
          ENV="${{ github.event.inputs.environment }}"
          SERVER_NAME="${{ vars.SERVER_NAME }}"
          if [ -z "$SERVER_NAME" ]; then
            echo "ERROR: SERVER_NAME environment variable is required. Set it in GitHub environment settings."
            exit 1
          fi
          echo "Using server name: $SERVER_NAME"
          echo "server_name=$SERVER_NAME" >> $GITHUB_OUTPUT
          cd ${{ env.TERRAFORM_DIR }}
          terraform plan -input=false \
            -var="hcloud_token=${{ secrets.HETZNER_API_TOKEN }}" \
            -var="server_name=$SERVER_NAME" \
            -var="location=${{ vars.HETZNER_LOCATION }}" \
            -var="server_type=${{ vars.SERVER_TYPE }}" \
            -var="hetzner_ssh_key_name=${{ vars.HETZNER_SSH_KEY_NAME }}" \
            -var="hcx_access_key=${{ secrets.HCX_ACCESS_KEY }}" \
            -var="hcx_secret_key=${{ secrets.HCX_SECRET_KEY }}"

      - name: Terraform Apply
        id: apply
        if: github.event.inputs.action == 'apply'
        run: |
          ENV="${{ github.event.inputs.environment }}"
          SERVER_NAME="${{ vars.SERVER_NAME }}"
          if [ -z "$SERVER_NAME" ]; then
            echo "ERROR: SERVER_NAME environment variable is required. Set it in GitHub environment settings."
            exit 1
          fi
          echo "Using server name: $SERVER_NAME"
          echo "server_name=$SERVER_NAME" >> $GITHUB_OUTPUT
          cd ${{ env.TERRAFORM_DIR }}

          # Install hcloud CLI to get server ID
          sudo apt-get update && sudo apt-get install -y hcloud-cli
          export HCLOUD_TOKEN=${{ secrets.HETZNER_API_TOKEN }}

          # Get existing server ID by name
          SERVER_ID=$(hcloud server list -o json 2>/dev/null | jq -r ".[] | select(.name == \"$SERVER_NAME\") | .id")
          if [ -n "$SERVER_ID" ]; then
            echo "Found existing server $SERVER_NAME with ID $SERVER_ID, importing into state..."
            # Import if not already in state (ignore error if already managed)
            terraform import -var="hcloud_token=${{ secrets.HETZNER_API_TOKEN }}" \
              -var="server_name=$SERVER_NAME" \
              -var="location=${{ vars.HETZNER_LOCATION }}" \
              -var="server_type=${{ vars.SERVER_TYPE }}" \
              -var="hetzner_ssh_key_name=${{ vars.HETZNER_SSH_KEY_NAME }}" \
              -var="hcx_access_key=${{ secrets.HCX_ACCESS_KEY }}" \
              -var="hcx_secret_key=${{ secrets.HCX_SECRET_KEY }}" \
              hcloud_server.main "$SERVER_ID" 2>&1 || {
                echo "Import failed (may already be in state) - continuing..."
              }
          else
            echo "No existing server found, will create new one"
          fi

          terraform apply -input=false -auto-approve \
            -var="hcloud_token=${{ secrets.HETZNER_API_TOKEN }}" \
            -var="server_name=$SERVER_NAME" \
            -var="location=${{ vars.HETZNER_LOCATION }}" \
            -var="server_type=${{ vars.SERVER_TYPE }}" \
            -var="hetzner_ssh_key_name=${{ vars.HETZNER_SSH_KEY_NAME }}" \
            -var="hcx_access_key=${{ secrets.HCX_ACCESS_KEY }}" \
            -var="hcx_secret_key=${{ secrets.HCX_SECRET_KEY }}"

      - name: Destroy server
        if: github.event.inputs.action == 'destroy'
        run: |
          # Install hcloud CLI via apt
          sudo apt-get update && sudo apt-get install -y hcloud-cli
          export HCLOUD_TOKEN=${{ secrets.HETZNER_API_TOKEN }}

          # Delete servers
          SERVER_ID=$(hcloud server list -o json 2>/dev/null | jq -r '.[] | select(.name | startswith("linux-desktop-")) | .id' | head -1)
          if [ -n "$SERVER_ID" ]; then
            echo "Deleting server: $SERVER_ID"
            hcloud server delete "$SERVER_ID"
            echo "Server deleted successfully"
          else
            echo "No linux-desktop servers found to delete"
          fi

      - name: Set outputs for apply
        if: github.event.inputs.action == 'apply'
        id: outputs
        run: |
          cd ${{ env.TERRAFORM_DIR }}
          SERVER_NAME="${{ vars.SERVER_NAME }}"
          if [ -z "$SERVER_NAME" ]; then
            echo "ERROR: SERVER_NAME environment variable is required"
            exit 1
          fi
          IP=$(terraform output -raw ipv4_address)
          echo "server_name=$SERVER_NAME" >> $GITHUB_OUTPUT
          echo "server_ip=$IP" >> $GITHUB_OUTPUT
          echo "$SERVER_NAME" > server-name.txt
          echo "$IP" > server-ip.txt

      - name: Upload server IP
        if: github.event.inputs.action == 'apply'
        uses: actions/upload-artifact@v4
        with:
          name: server-info
          path: |
            ${{ env.TERRAFORM_DIR }}/server-ip.txt
            ${{ env.TERRAFORM_DIR }}/server-name.txt

      # No longer needed - state is in S3 backend

  deploy:
    name: Deploy Desktop
    needs: terraform
    if: github.event.inputs.action == 'apply'
    runs-on: ubuntu-latest
    environment: head

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download server info
        uses: actions/download-artifact@v4
        with:
          name: server-info
          path: ${{ env.TERRAFORM_DIR }}/

      - name: Get server info
        run: |
          SERVER_NAME=$(cat ${{ env.TERRAFORM_DIR }}/server-name.txt)
          IP=$(cat ${{ env.TERRAFORM_DIR }}/server-ip.txt)
          echo "SERVER_NAME=$SERVER_NAME" >> $GITHUB_ENV
          echo "SERVER_IP=$IP" >> $GITHUB_ENV
          echo "Server: $SERVER_NAME ($IP)"

      - name: Wait for server to be ready
        run: |
          echo "Waiting for SSH to become available..."
          for i in {1..30}; do
            if nc -z -w5 ${{ env.SERVER_IP }} 22 2>/dev/null; then
              echo "SSH is ready!"
              exit 0
            fi
            echo "Attempt $i/30 - SSH not ready, waiting 10s..."
            sleep 10
          done
          echo "SSH did not become ready in time"
          exit 1
        shell: bash

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Debug: check key format
          echo "=== Key first line ==="
          head -1 ~/.ssh/id_ed25519
          echo "=== Key last line ==="
          tail -1 ~/.ssh/id_ed25519
          echo "=== Testing private key ==="
          ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null 2>&1 && echo "KEY_VALID" || echo "KEY_INVALID"
          echo "=== Byte count ==="
          wc -c < ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ env.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy deployment script and modules
        run: |
          scp -o StrictHostKeyChecking=no -r deploy-desktop.sh root@${{ env.SERVER_IP }}:/tmp/
          scp -o StrictHostKeyChecking=no -r scripts root@${{ env.SERVER_IP }}:/tmp/

      - name: Run deployment
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENCLAW_DISCORD_CHANNEL_ID: ${{ vars.OPENCLAW_DISCORD_CHANNEL_ID }}
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ env.SERVER_IP }} \
            "export DISCORD_BOT_TOKEN='$DISCORD_BOT_TOKEN' && export OPENROUTER_API_KEY='$OPENROUTER_API_KEY' && export OPENCLAW_DISCORD_CHANNEL_ID='$OPENCLAW_DISCORD_CHANNEL_ID' && cd /tmp && bash deploy-desktop.sh"

      - name: Show connection info
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Server IP:** ${{ env.SERVER_IP }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**RDP Access:** Connect to ${{ env.SERVER_IP }}:3389" >> $GITHUB_STEP_SUMMARY